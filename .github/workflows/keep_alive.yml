name: Keep Render Alive

# Runs every 10 minutes, 24/7.
# Free tier of GitHub Actions gives 2,000 minutes/month on public repos
# and 500 minutes/month on private repos — this workflow uses ~4,320 min/month
# on public repos (free) but only ~1 min per run on private repos counts.
# For a private repo, use cron-job.org instead (see README).

on:
  schedule:
    # UTC — runs at :00 and :10 and :20 … every hour
    - cron: "*/10 * * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  ping:
    name: Ping health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping /health
        run: |
          echo "Pinging ${{ secrets.RENDER_APP_URL }}/health …"
          STATUS=$(curl --silent --output /dev/null \
                        --write-out "%{http_code}" \
                        --max-time 30 \
                        --retry 2 \
                        --retry-delay 5 \
                        "${{ secrets.RENDER_APP_URL }}/health")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Health check returned $STATUS"
          fi