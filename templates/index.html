<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Disease Classification</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; }
        button { background: #4CAF50; color: white; padding: 15px 30px; border: none; cursor: pointer; border-radius: 5px; font-size: 16px; }
        button:hover { background: #45a049; }
    {% extends "base.html" %}
    {% block title %}Home{% endblock %}
    {% block content %}
        <div style="text-align:center; padding:40px;">
            <h1>Fish Disease Classifier</h1>
            <p>Upload an image of a fish to classify common diseases.</p>
            <a href="{{ url_for('predict_get') }}" style="display:inline-block;background:#0b5;color:#fff;padding:12px 20px;border-radius:6px;text-decoration:none;">Classify disease</a>
        </div>
    {% endblock %}
</html>
