  
{% extends "base.html" %}
{% block title %}Classify{% endblock %}
{% block content %}
    <div style="max-width:720px;margin:16px auto;padding:12px;">
        <h2>Classify Fish Disease</h2>

        {% if error %}
            <div style="background:#fee;color:#900;padding:8px;border-radius:6px">{{ error }}</div>
        {% endif %}

        <form id="uploadForm" method="post" action="{{ url_for('predict_disease') }}" enctype="multipart/form-data">
            <div>
                <input type="file" name="image" accept="image/*" id="imageInput" required />
            </div>
            <div style="margin-top:8px">
                <button type="submit">Upload & Classify</button>
            </div>
        </form>

        {% if success %}
            <div id="result" style="margin-top:20px;border:1px solid #ddd;padding:12px;border-radius:8px;">
                <h3>Result</h3>
                <div style="display:flex;gap:12px;align-items:center">
                    <img src="/{{ image_path }}" style="max-width:240px;border-radius:6px;border:1px solid #ccc;" />
                    <div>
                        <p>Disease: <strong>{{ disease }}</strong></p>
                        <p>Confidence: <strong>{{ confidence }}</strong></p>
                        <p><a href="{{ url_for('history') }}">View history</a></p>
                    </div>
                </div>

                <div style="margin-top:12px">
                    <button id="toggleFeedback" type="button">Give Feedback</button>
                </div>

                <div id="feedbackArea" style="display:none;margin-top:12px;border-top:1px solid #eee;padding-top:12px;">
                    <form method="post" action="{{ url_for('submit_feedback') }}">
                        <input type="hidden" name="prediction_id" value="{{ prediction_id }}" />
                        <label>
                            Was this correct?
                            <select name="is_corrected">
                                <option value="false">Yes</option>
                                <option value="true">No</option>
                            </select>
                        </label>
                        <div style="margin-top:8px">
                            <label>Correct label (if wrong): <input name="corrected_label" /></label>
                        </div>
                        <div style="margin-top:8px">
                            <label>Note: <input name="note" /></label>
                        </div>
                        <div style="margin-top:8px"><button type="submit">Submit feedback</button></div>
                    </form>
                </div>
            </div>
        {% endif %}
    </div>

    <script>
        const toggle = document.getElementById('toggleFeedback')
        const feedback = document.getElementById('feedbackArea')
        if (toggle) toggle.addEventListener('click', () => {
            if (feedback.style.display === 'none') feedback.style.display = 'block'
            else feedback.style.display = 'none'
        })
    </script>
{% endblock %}
